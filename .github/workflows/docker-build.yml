      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            whoami
            hostname

            docker --version

            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-cicd-pipeline:latest

            docker stop devops-app || true
            docker rm devops-app || true

            docker run -d \
              --name devops-app \
              --restart unless-stopped \
              -p 5000:80 \
              ${{ secrets.DOCKER_USERNAME }}/devops-cicd-pipeline:latest

            echo "Waiting for container..."
            sleep 10

            docker ps

            curl --retry 5 --retry-delay 2 --fail http://localhost:5000

            echo "Deployment Successful!"
