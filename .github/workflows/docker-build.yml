name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-cicd-pipeline:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-cicd-pipeline:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2"

            docker --version

            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-cicd-pipeline:latest

            docker stop devops-app || true
            docker rm devops-app || true

            docker run -d \
              --name devops-app \
              --restart unless-stopped \
              -p 5000:80 \
              ${{ secrets.DOCKER_USERNAME }}/devops-cicd-pipeline:latest

            echo "Waiting for application to start..."

            until curl -fs http://localhost:5000 >/dev/null; do
              echo "Application not ready yet..."
              sleep 2
            done

            echo "Application is healthy."

            docker ps

            echo "Deployment Successful!"
